name: Ritense PR examinator

on:
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/projects/plugin/**'
      - 'backend/plugin/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '!**/*.md'
jobs:
  PR_Ritense:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: "⏳ Post review started comment"
        id: progress_comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## 🤖 Claude Review — In Progress',
              '',
              '| Step | Status |',
              '|------|--------|',
              '| 📥 Checkout          | ✅ Done   |',
              '| 🔍 Analysing diff    | ⏳ Running |',
              '| 💬 Posting feedback  | ⏳ Pending |',
              '',
              '_Claude is reviewing your changes. This comment will be updated when complete._',
            ].join('\n');
            
            const pr_number = context.payload.pull_request?.number
              ?? context.payload.issue?.number;
            
            const comment = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              body,
            });
            
            core.setOutput('comment_id', comment.data.id);
            core.setOutput('pr_number', pr_number);

      - name: PR Review with Progress Tracking
        id: claude_review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          path_to_claude_code_executable: ${{ env.CLAUDE_PATH }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            
            Please review this pull request with plugin-pr-reviewer agent.

            Note: The PR branch is already checked out in the current working directory.

            At the very end of your review, append a hidden HTML comment block exactly like this
            (fill in the real values):
            <!-- CLAUDE_META
            model: <model-name>
            input_tokens: <number>
            output_tokens: <number>
            cost_usd: <estimated-cost>
            -->

      - name: "📊 Extract Claude metadata"
        id: extract_meta
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // Read the latest PR comments to find Claude's review comment
            const pr_number = ${{ steps.progress_comment.outputs.pr_number }};
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              per_page: 20,
            });

            // Find the most recent comment containing CLAUDE_META
            let model = 'claude-sonnet-4-5';
            let inputTokens = 'N/A';
            let outputTokens = 'N/A';
            let costUsd = 'N/A';

            for (const c of comments.data.reverse()) {
              const match = c.body?.match(/<!-- CLAUDE_META\s+([\s\S]*?)-->/);
              if (match) {
                const meta = match[1];
                model       = meta.match(/model:\s*(.+)/)?.[1]?.trim()        ?? model;
                inputTokens = meta.match(/input_tokens:\s*(.+)/)?.[1]?.trim() ?? inputTokens;
                outputTokens= meta.match(/output_tokens:\s*(.+)/)?.[1]?.trim()?? outputTokens;
                costUsd     = meta.match(/cost_usd:\s*(.+)/)?.[1]?.trim()     ?? costUsd;
                break;
              }
            }

            core.setOutput('model', model);
            core.setOutput('input_tokens', inputTokens);
            core.setOutput('output_tokens', outputTokens);
            core.setOutput('cost_usd', costUsd);

      - name: "✅ Update progress comment (success)"
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const model       = '${{ steps.extract_meta.outputs.model }}';
            const inputTok    = '${{ steps.extract_meta.outputs.input_tokens }}';
            const outputTok   = '${{ steps.extract_meta.outputs.output_tokens }}';
            const cost        = '${{ steps.extract_meta.outputs.cost_usd }}';

            const body = [
              '## 🤖 Claude Review — Complete ✅',
              '',
              '| Step | Status |',
              '|------|--------|',
              '| 📥 Checkout          | ✅ Done |',
              '| 🔍 Analysing diff    | ✅ Done |',
              '| 💬 Posting feedback  | ✅ Done |',
              '',
              '### 📈 Usage',
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| 🧠 Model         | \`${model}\`   |`,
              `| 📨 Input tokens  | ${inputTok}    |`,
              `| 📤 Output tokens | ${outputTok}   |`,
              `| 💰 Est. cost     | $${cost}       |`,
              '',
              `_Review completed at ${new Date().toUTCString()}_`,
            ].join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.progress_comment.outputs.comment_id }},
              body,
            });

      - name: "❌ Update progress comment (failure)"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## 🤖 Claude Review — Failed ❌',
              '',
              '| Step | Status |',
              '|------|--------|',
              '| 📥 Checkout          | ✅ Done    |',
              '| 🔍 Analysing diff    | ❌ Failed  |',
              '| 💬 Posting feedback  | ⏳ Skipped |',
              '',
              '**The review encountered an error.** Check the [Actions log](' +
              `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` +
              ') for details.',
              '',
            ].join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.progress_comment.outputs.comment_id }},
              body,
            });
