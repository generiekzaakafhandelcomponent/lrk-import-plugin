name: lrk-import-plugin

services:
  plugin-keycloak:
    container_name: lrk-import-plugin-keycloak
    depends_on:
      - plugin-keycloak-database
    image: quay.io/keycloak/keycloak:26.2.2
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://plugin-keycloak-database/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_FEATURES: token-exchange,admin-fine-grained-authz
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
    volumes:
      - ./imports/keycloak:/opt/keycloak/data/import
    command:
      - start-dev
      - --import-realm
      - --http-enabled=true
      - --hostname-strict=false
    healthcheck:
      test: [ 'CMD-SHELL', '[ -f /tmp/HealthCheck.java ] || echo "public class HealthCheck { public static void main(String[] args) throws java.lang.Throwable { System.exit(((java.net.HttpURLConnection)new java.net.URL(args[0]).openConnection()).getResponseCode() == 200 ? 0 : 1); } }" > /tmp/HealthCheck.java && java /tmp/HealthCheck.java http://localhost:8080/auth' ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 5s

  plugin-keycloak-database:
    image: postgres:17.4
    container_name: lrk-import-plugin-keycloak-database
    ports:
      - "54329:5432"
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak

  plugin-database:
    container_name: lrk-import-plugin-database
    image: postgres:17.4
    ports:
      - "54320:5432"
    environment:
      POSTGRES_USER: plugin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: plugin
    volumes:
      - plugin-database-data:/var/lib/postgresql/data # persist data even if container shuts down


  # ── Hasura GraphQL Engine ──────────────────────────────────────────────────
  hasura:
    image: hasura/graphql-engine:v2.38.0
    container_name: lrk-import-hasura
    restart: unless-stopped
    depends_on:
      - hasura-database
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://hasura:hasura@hasura-database:5432/hasura
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup,http-log,webhook-log
      HASURA_GRAPHQL_ADMIN_SECRET: admin
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgres://hasura:hasura@hasura-database:5432/hasura
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
      HASURA_GRAPHQL_LOG_LEVEL: debug
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  hasura-database:
    container_name: lrk-import-hasura-database
    image: postgres:17.4
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: hasura
      POSTGRES_PASSWORD: hasura
      POSTGRES_DB: hasura
    volumes:
      - lrk-import-database-data:/var/lib/postgresql/data # persist

volumes:
  lrk-import-database-data:
  plugin-database-data:
