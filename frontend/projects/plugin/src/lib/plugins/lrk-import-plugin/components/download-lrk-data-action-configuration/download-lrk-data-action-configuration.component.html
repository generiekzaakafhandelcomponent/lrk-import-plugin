<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null
  } as obs"
>
  <v-input
    name="csvUrl"
    [title]="'csvUrl' | pluginTranslate: pluginId | async"
    [margin]="true"
    [disabled]="obs.disabled"
    [defaultValue]="obs.prefill?.csvUrl"
    [required]="true"
    [widthPx]="350"
  ></v-input>

  <v-input
    name="batchSize"
    [title]="'batchSize' | pluginTranslate: pluginId | async"
    [margin]="true"
    [disabled]="obs.disabled"
    [defaultValue]="obs.prefill?.batchSize?.toString()"
    [required]="true"
    [widthPx]="350"
  ></v-input>

  <v-input
    name="houdersCollectionVariable"
    [title]="'houdersCollectionVariable' | pluginTranslate: pluginId | async"
    [margin]="true"
    [disabled]="obs.disabled"
    [defaultValue]="obs.prefill?.houdersCollectionVariable"
    [required]="true"
    [widthPx]="350"
  ></v-input>

  <v-input
    name="voorzieningenCollectionVariable"
    [title]="'voorzieningenCollectionVariable' | pluginTranslate: pluginId | async"
    [margin]="true"
    [disabled]="obs.disabled"
    [defaultValue]="obs.prefill?.voorzieningenCollectionVariable"
    [required]="true"
    [widthPx]="350"
  ></v-input>

  <valtimo-carbon-multi-input
    name="cbsCodes"
    [title]="'cbsCodes' | pluginTranslate: pluginId | async"
    [defaultValues]="defaultCbsCodes$ | async"
    [fullWidth]="true"
  ></valtimo-carbon-multi-input>
</v-form>
