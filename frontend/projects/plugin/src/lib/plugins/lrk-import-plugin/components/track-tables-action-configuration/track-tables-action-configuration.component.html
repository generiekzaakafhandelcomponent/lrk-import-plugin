<div *ngIf="{disabled: disabled$ | async} as obs">
  <label class="v-label">
    {{ 'tables' | pluginTranslate: pluginId | async }}
  </label>

  <div
    *ngFor="let table of tables; let i = index; trackBy: trackByIndex"
    class="track-tables-row"
  >
    <v-input
      [name]="'table-' + i"
      [margin]="false"
      [disabled]="obs.disabled"
      [defaultValue]="table"
      [required]="true"
      [widthPx]="300"
      [placeholder]="'tablePlaceholder' | pluginTranslate: pluginId | async"
      (valueChange)="onTableChange(i, $event)"
    ></v-input>
    <button
      type="button"
      class="v-button v-button--secondary track-tables-remove"
      [disabled]="obs.disabled || tables.length === 1"
      (click)="removeTable(i)"
    >
      {{ 'removeTable' | pluginTranslate: pluginId | async }}
    </button>
  </div>

  <button
    type="button"
    class="v-button v-button--secondary track-tables-add"
    [disabled]="obs.disabled"
    (click)="addTable()"
  >
    {{ 'addTable' | pluginTranslate: pluginId | async }}
  </button>
</div>
